name: Publish to npm + GHCR

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  # 1. Publish the `kontroapi` CLI to npmjs.org
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install root deps
        run: npm ci --ignore-scripts

      - name: Build shared package
        run: npm run build -w packages/shared

      - name: Build CLI
        run: npm run build -w packages/cli

      - name: Verify package contents
        run: npm pack --dry-run -w packages/cli

      - name: Publish to npm
        run: npm publish -w packages/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # 2. Build & push `kontroapi/engine` Docker image to GHCR
  publish-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push engine image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: engine
          push: true
          tags: |
            ghcr.io/fahimuntasin/kontroapi/engine:latest
            ghcr.io/fahimuntasin/kontroapi/engine:${{ steps.version.outputs.VERSION }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3. Build & push `kontroapi/dashboard` Docker image to GHCR
  publish-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: dashboard
          push: true
          tags: |
            ghcr.io/fahimuntasin/kontroapi/dashboard:latest
            ghcr.io/fahimuntasin/kontroapi/dashboard:${{ steps.version.outputs.VERSION }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 4. Create GitHub Release with notes
  release:
    runs-on: ubuntu-latest
    needs: [publish-npm, publish-engine, publish-dashboard]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          fail_on_unmatched_files: true
